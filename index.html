<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4F46E5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="일정 메모장" />
  <title>일정 메모장</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; }
    .app { max-width: 430px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: #fff; box-shadow: 0 0 40px rgba(0,0,0,0.1); }
    .status-bar { background: #4F46E5; color: #fff; font-size: 12px; padding: env(safe-area-inset-top, 10px) 20px 6px; display: flex; justify-content: space-between; }
    .app-header { background: #4F46E5; padding: 8px 20px 18px; color: #fff; }
    .app-header h1 { font-size: 20px; font-weight: 600; }
    .app-header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
    .gcal-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 10px; font-size: 11px; margin-top: 8px; }
    .gcal-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; }
    .body-area { flex: 1; overflow-y: auto; padding: 16px; background: #f3f4f6; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }
    .notif-card { background: #EEF2FF; border-radius: 14px; border: 1px solid #C7D2FE; padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start; }
    .notif-icon { font-size: 18px; flex-shrink: 0; }
    .notif-text { font-size: 13px; color: #3730A3; }
    .notif-time { font-size: 11px; color: #818CF8; margin-top: 2px; }
    .memo-input-card { background: #fff; border-radius: 14px; border: 1px solid #e5e7eb; padding: 14px; }
    .memo-input-card > label { font-size: 12px; color: #6b7280; display: block; margin-bottom: 6px; }
    textarea { width: 100%; border: 1px solid #d1d5db; border-radius: 10px; padding: 10px; font-size: 15px; resize: none; height: 85px; background: #f9fafb; color: #111827; font-family: inherit; line-height: 1.5; }
    textarea:focus { outline: none; border-color: #4F46E5; }
    .alert-section { margin-top: 12px; }
    .alert-section > label { font-size: 12px; color: #6b7280; display: block; margin-bottom: 7px; }
    .alert-chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip { font-size: 13px; padding: 6px 13px; border-radius: 20px; cursor: pointer; border: 1px solid #d1d5db; background: #f9fafb; color: #6b7280; user-select: none; transition: all 0.15s; }
    .chip.selected { background: #EEF2FF; color: #4338CA; border-color: #A5B4FC; font-weight: 600; }
    .parse-btn { width: 100%; margin-top: 13px; background: #4F46E5; color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 15px; cursor: pointer; font-weight: 600; }
    .parse-btn:active { background: #4338CA; }
    .parsed-preview { background: #fff; border-radius: 14px; border: 1px solid #A5B4FC; padding: 14px; display: none; }
    .parsed-preview.show { display: block; }
    .parsed-preview h3 { font-size: 13px; color: #4F46E5; font-weight: 600; margin-bottom: 11px; }
    .parsed-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 9px; }
    .parsed-label { min-width: 44px; font-size: 11px; color: #9ca3af; padding-top: 2px; }
    .parsed-val { color: #111827; flex: 1; font-size: 14px; border-bottom: 1px dashed #d1d5db; outline: none; padding-bottom: 2px; }
    .alert-summary { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }
    .alert-tag-preview { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: #EEF2FF; color: #4338CA; font-weight: 500; }
    .action-row { display: flex; gap: 8px; margin-top: 13px; }
    .add-btn { flex: 1; background: #4F46E5; color: #fff; border: none; border-radius: 10px; padding: 11px; font-size: 14px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .add-btn:active { background: #4338CA; }
    .cancel-btn { background: #f3f4f6; color: #6b7280; border: 1px solid #d1d5db; border-radius: 10px; padding: 11px 16px; font-size: 14px; cursor: pointer; }
    .section-title { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.07em; padding: 0 2px; }
    .event-card { background: #fff; border-radius: 14px; border: 1px solid #e5e7eb; padding: 13px 14px; display: flex; align-items: flex-start; gap: 12px; }
    .event-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .event-info { flex: 1; }
    .event-title { font-size: 15px; font-weight: 600; color: #111827; }
    .event-time { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .event-tags { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; }
    .tag { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
    .tag-gcal { background: #EEF2FF; color: #4338CA; }
    .tag-alert { background: #FEF3C7; color: #92400E; }
    .event-btns { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }
    .del-btn { background: none; border: 1px solid #e5e7eb; border-radius: 8px; padding: 5px 9px; font-size: 12px; cursor: pointer; color: #9ca3af; }
    .del-btn:active { border-color: #EF4444; color: #EF4444; }
    .open-gcal-btn { background: #EEF2FF; border: 1px solid #C7D2FE; border-radius: 8px; padding: 5px 9px; font-size: 10px; cursor: pointer; color: #4338CA; white-space: nowrap; }
    .open-gcal-btn:active { background: #C7D2FE; }
    .bottom-nav { background: #fff; border-top: 1px solid #e5e7eb; display: flex; padding: 10px 0 max(16px, env(safe-area-inset-bottom)); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; padding: 4px 0; }
    .nav-label { font-size: 10px; color: #9ca3af; }
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1E1B4B; color: #fff; font-size: 13px; padding: 9px 18px; border-radius: 20px; white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="app">
  <div class="status-bar">
    <span id="clock">9:41</span><span>●●●</span>
  </div>
  <div class="app-header">
    <h1>일정 메모장</h1>
    <p>메모만 써도 캘린더에 등록돼요</p>
    <div class="gcal-badge">
      <div class="gcal-dot"></div>
      <span id="gcal-label">Google Calendar 연동됨</span>
    </div>
  </div>

  <div class="body-area">
    <div class="notif-card">
      <div class="notif-icon">🔔</div>
      <div>
        <div class="notif-text">오늘 오후 3시 — 팀 회의</div>
        <div class="notif-time">30분 전 알림 예정 · 2시 30분</div>
      </div>
    </div>

    <div class="memo-input-card">
      <label>일정 메모 입력</label>
      <textarea id="memo-input" placeholder="예: 내일 오후 2시에 치과 예약&#10;예: 5월 3일 팀 미팅 오전 10시 강남"></textarea>
      <div class="alert-section">
        <label>알림 시간 선택 (복수 선택 가능)</label>
        <div class="alert-chips" id="alert-chips">
          <div class="chip" data-val="1달 전" data-min="43200" onclick="toggleChip(this)">1달 전</div>
          <div class="chip" data-val="1주일 전" data-min="10080" onclick="toggleChip(this)">1주일 전</div>
          <div class="chip" data-val="3일 전" data-min="4320" onclick="toggleChip(this)">3일 전</div>
          <div class="chip" data-val="1일 전" data-min="1440" onclick="toggleChip(this)">1일 전</div>
          <div class="chip selected" data-val="1시간 전" data-min="60" onclick="toggleChip(this)">1시간 전</div>
          <div class="chip" data-val="10분 전" data-min="10" onclick="toggleChip(this)">10분 전</div>
        </div>
      </div>
      <button class="parse-btn" onclick="parseMemo()">일정 분석하기</button>
    </div>

    <div class="parsed-preview" id="parsed-preview">
      <h3>분석된 일정 — 수정 후 등록하세요</h3>
      <div class="parsed-row">
        <div class="parsed-label">제목</div>
        <div class="parsed-val" id="p-title" contenteditable="true"></div>
      </div>
      <div class="parsed-row">
        <div class="parsed-label">날짜</div>
        <div class="parsed-val" id="p-date" contenteditable="true"></div>
      </div>
      <div class="parsed-row">
        <div class="parsed-label">시간</div>
        <div class="parsed-val" id="p-time" contenteditable="true"></div>
      </div>
      <div class="parsed-row">
        <div class="parsed-label">알림</div>
        <div class="alert-summary" id="p-alert"></div>
      </div>
      <div class="action-row">
        <button class="add-btn" onclick="addEvent()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          Google Calendar에 등록
        </button>
        <button class="cancel-btn" onclick="document.getElementById('parsed-preview').classList.remove('show')">취소</button>
      </div>
    </div>

    <div class="section-title">등록된 일정</div>

    <div id="events-list">
      <div class="event-card">
        <div class="event-dot" style="background:#4F46E5"></div>
        <div class="event-info">
          <div class="event-title">팀 회의</div>
          <div class="event-time">오늘 · 오후 3:00</div>
          <div class="event-tags">
            <span class="tag tag-gcal">구글 캘린더</span>
            <span class="tag tag-alert">1시간 전</span>
            <span class="tag tag-alert">10분 전</span>
          </div>
        </div>
        <div class="event-btns">
          <button class="del-btn" onclick="this.closest('.event-card').remove()">✕</button>
        </div>
      </div>
      <div class="event-card">
        <div class="event-dot" style="background:#0891B2"></div>
        <div class="event-info">
          <div class="event-title">치과 예약</div>
          <div class="event-time">내일 · 오후 2:00</div>
          <div class="event-tags">
            <span class="tag tag-gcal">구글 캘린더</span>
            <span class="tag tag-alert">1일 전</span>
            <span class="tag tag-alert">1시간 전</span>
          </div>
        </div>
        <div class="event-btns">
          <button class="del-btn" onclick="this.closest('.event-card').remove()">✕</button>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn">
      <svg width="22" height="22" fill="none" stroke="#4F46E5" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      <span class="nav-label" style="color:#4F46E5">홈</span>
    </button>
    <button class="nav-btn">
      <svg width="22" height="22" fill="none" stroke="#9ca3af" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span class="nav-label">캘린더</span>
    </button>
    <button class="nav-btn">
      <svg width="22" height="22" fill="none" stroke="#9ca3af" stroke-width="1.5" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      <span class="nav-label">알림</span>
    </button>
    <button class="nav-btn">
      <svg width="22" height="22" fill="none" stroke="#9ca3af" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span class="nav-label">설정</span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const COLORS = ['#4F46E5','#0891B2','#16A34A','#D97706','#7C3AED','#DC2626'];
  let colorIdx = 1;

  function toggleChip(el) { el.classList.toggle('selected'); }

  function getSelectedAlerts() {
    return [...document.querySelectorAll('#alert-chips .chip.selected')]
      .map(c => ({ val: c.dataset.val, min: parseInt(c.dataset.min) }));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function buildGCalURL(title, dateStr, timeStr) {
    const now = new Date();
    const year = now.getFullYear();
    let month = now.getMonth() + 1, day = now.getDate();

    if (/내일/.test(dateStr)) {
      const t = new Date(now); t.setDate(t.getDate()+1);
      month = t.getMonth()+1; day = t.getDate();
    } else {
      const dm = dateStr.match(/(\d{1,2})월\s*(\d{1,2})일/);
      if (dm) { month = parseInt(dm[1]); day = parseInt(dm[2]); }
    }

    let hour = 9, min = 0;
    const am = timeStr.match(/오전\s*(\d+):(\d+)/);
    const pm = timeStr.match(/오후\s*(\d+):(\d+)/);
    if (am) { hour = parseInt(am[1]); min = parseInt(am[2]); }
    else if (pm) { hour = parseInt(pm[1]) + 12; min = parseInt(pm[2]); if(hour>=24) hour=23; }

    const pad = n => String(n).padStart(2,'0');
    const start = `${year}${pad(month)}${pad(day)}T${pad(hour)}${pad(min)}00`;
    const endD = new Date(year, month-1, day, hour+1, min);
    const end = `${endD.getFullYear()}${pad(endD.getMonth()+1)}${pad(endD.getDate())}T${pad(endD.getHours())}${pad(endD.getMinutes())}00`;

    return `https://calendar.google.com/calendar/render?action=TEMPLATE`
      + `&text=${encodeURIComponent(title)}`
      + `&dates=${start}/${end}`
      + `&details=${encodeURIComponent('일정 메모장 앱에서 등록됨')}`;
  }

  function parseMemo() {
    const raw = document.getElementById('memo-input').value.trim();
    if (!raw) { showToast('메모를 입력해주세요'); return; }

    const today = new Date();
    const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
    const fmt = d => `${d.getMonth()+1}월 ${d.getDate()}일`;

    let title = raw, date = fmt(today), time = '오전 9:00';

    const tm = raw.match(/오전\s*(\d+)시(?:\s*(\d+)분)?|오후\s*(\d+)시(?:\s*(\d+)분)?/);
    if (tm) {
      if (tm[1]) time = `오전 ${tm[1]}:${tm[2]||'00'}`;
      else if (tm[3]) time = `오후 ${tm[3]}:${tm[4]||'00'}`;
    }

    if (/내일/.test(raw)) date = fmt(tomorrow);
    else if (/오늘/.test(raw)) date = fmt(today);
    else { const dm = raw.match(/(\d{1,2})월\s*(\d{1,2})일/); if (dm) date = `${dm[1]}월 ${dm[2]}일`; }

    let t = raw.replace(/내일|오늘|\d+월\s*\d+일|오전|오후|\d+시|\d+분|알림|알려줘|예약|등록/g,'').replace(/\s+/g,' ').trim();
    if (t.length > 1) title = t;

    const alerts = getSelectedAlerts();
    if (alerts.length === 0) { showToast('알림 시간을 하나 이상 선택해주세요'); return; }

    document.getElementById('p-title').textContent = title;
    document.getElementById('p-date').textContent = date;
    document.getElementById('p-time').textContent = time;
    document.getElementById('p-alert').innerHTML = alerts.map(a =>
      `<span class="alert-tag-preview">${a.val}</span>`).join('');
    document.getElementById('parsed-preview').classList.add('show');
  }

  function addEvent() {
    const title = document.getElementById('p-title').textContent.trim();
    const date  = document.getElementById('p-date').textContent.trim();
    const time  = document.getElementById('p-time').textContent.trim();
    const alertEls = [...document.querySelectorAll('#p-alert .alert-tag-preview')];
    const alertLabels = alertEls.map(el => el.textContent);

    // 구글 캘린더 새 탭으로 열기
    const gcalURL = buildGCalURL(title, date, time);
    window.open(gcalURL, '_blank');

    // 카드 추가
    colorIdx = (colorIdx + 1) % COLORS.length;
    const savedURL = gcalURL;
    const card = document.createElement('div');
    card.className = 'event-card';
    card.innerHTML = `
      <div class="event-dot" style="background:${COLORS[colorIdx]}"></div>
      <div class="event-info">
        <div class="event-title">${title}</div>
        <div class="event-time">${date} · ${time}</div>
        <div class="event-tags">
          <span class="tag tag-gcal">구글 캘린더</span>
          ${alertLabels.map(a=>`<span class="tag tag-alert">${a}</span>`).join('')}
        </div>
      </div>
      <div class="event-btns">
        <button class="del-btn" onclick="this.closest('.event-card').remove()">✕</button>
        <button class="open-gcal-btn" onclick="window.open('${savedURL}','_blank')">캘린더 열기</button>
      </div>
    `;
    document.getElementById('events-list').insertBefore(card, document.getElementById('events-list').firstChild);
    document.getElementById('parsed-preview').classList.remove('show');
    document.getElementById('memo-input').value = '';
    document.querySelectorAll('#alert-chips .chip').forEach(c => c.classList.remove('selected'));

    const lbl = document.getElementById('gcal-label');
    lbl.textContent = '캘린더 페이지 열림!';
    setTimeout(() => lbl.textContent = 'Google Calendar 연동됨', 3000);
    showToast('구글 캘린더가 열렸어요 — 저장 버튼을 눌러주세요!');
  }

  setInterval(() => {
    const now = new Date();
    document.getElementById('clock').textContent =
      `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  }, 1000);
</script>
</body>
</html>
